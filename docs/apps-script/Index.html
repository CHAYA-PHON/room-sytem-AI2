    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden transform transition-all duration-300 scale-100 border border-slate-100">

      </div>
      <form id="loginForm" class="p-8 space-y-6">
        <div>
          <label class="block text-sm font-semibold text-slate-700 mb-2">ชื่อผู้ใช้งาน (User)</label>
          <div class="relative">

            </span>
            <input type="text" id="loginUser" required class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-slate-800" placeholder="ระบุผู้ใช้ เช่น admin">

        <div>

            <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i data-lucide="lock" class="w-5 h-5"></i>
            </span>
            <input type="password" id="loginPin" required pattern="[0-9]*" inputmode="numeric" class="w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all text-slate-800" placeholder="รหัส PIN 4 หลัก">

        </div>
